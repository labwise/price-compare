<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>썬탱의 최저가 비교 사이트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Malgun Gothic', sans-serif; background: #f0f2f8; color: #222; }

    /* ── 헤더 ── */
    header {
      background: #1a73e8;
      color: #fff;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 20px; font-weight: 700; white-space: nowrap; }
    .search-row { display: flex; gap: 8px; flex: 1; }
    .search-row input {
      flex: 1;
      padding: 10px 14px;
      font-size: 14px;
      border: none;
      border-radius: 8px;
      outline: none;
    }
    .search-row button {
      padding: 10px 20px;
      background: #fff;
      color: #1a73e8;
      font-size: 14px;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      white-space: nowrap;
    }
    .search-row button:hover { background: #e8f0fe; }

    /* ── 탭 바 ── */
    #tabBar {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      padding: 10px 16px 0;
      background: #1a73e8;
      overflow-x: auto;
    }
    .tab {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: #e8f0fe;
      color: #1a73e8;
      border-radius: 8px 8px 0 0;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .tab.active { background: #f0f2f8; color: #222; }
    .tab:not(.active):hover { background: #c5d8fd; }
    .tab .close-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 15px;
      color: inherit;
      opacity: 0.6;
      line-height: 1;
      padding: 0 2px;
    }
    .tab .close-btn:hover { opacity: 1; }
    #noTab {
      padding: 10px 16px;
      color: rgba(255,255,255,0.7);
      font-size: 13px;
    }

    /* ── 탭 패널 ── */
    .tab-panel { display: none; padding: 16px; max-width: 1200px; margin: 0 auto; }
    .tab-panel.active { display: block; }

    /* ── 설정 바 ── */
    .ctrl-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fff;
      border-radius: 10px;
      padding: 10px 16px;
      margin-bottom: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      flex-wrap: wrap;
    }
    .ctrl-bar label { font-size: 13px; color: #555; }
    .ctrl-bar select {
      padding: 6px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }
    .ctrl-bar .last-update { font-size: 12px; color: #999; margin-left: auto; }
    .ctrl-bar .refresh-btn {
      padding: 6px 14px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }
    .ctrl-bar .refresh-btn:hover { background: #1558b0; }
    .countdown {
      font-size: 12px;
      color: #fff;
      background: #34a853;
      padding: 3px 10px;
      border-radius: 12px;
      display: none;
    }
    .countdown.active { display: inline-block; }

    /* ── 필터 바 ── */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #fff;
      border-radius: 10px;
      padding: 10px 16px;
      margin-bottom: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      flex-wrap: wrap;
    }
    .filter-bar label { font-size: 13px; color: #555; white-space: nowrap; }
    .filter-bar input[type="text"] {
      flex: 1;
      min-width: 160px;
      padding: 6px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
    }
    .filter-bar input[type="number"] {
      width: 110px;
      padding: 6px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
    }
    .filter-bar .divider { color: #ccc; }
    .filter-count {
      font-size: 12px;
      color: #e53e3e;
      font-weight: 600;
      margin-left: auto;
      white-space: nowrap;
    }

    /* ── 알림 배너 ── */
    .alert-area { margin-bottom: 12px; }
    .alert-card {
      display: flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(135deg, #fff8e1, #fff3cd);
      border: 2px solid #f59e0b;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 8px;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
    .alert-icon { font-size: 24px; }
    .alert-body { flex: 1; }
    .alert-title { font-size: 14px; font-weight: 700; color: #b45309; }
    .alert-desc { font-size: 13px; color: #555; margin-top: 3px; }
    .alert-desc a { color: #1a73e8; text-decoration: none; font-weight: 600; }
    .alert-desc a:hover { text-decoration: underline; }
    .alert-dismiss {
      background: none;
      border: 1px solid #f59e0b;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
      color: #b45309;
    }

    /* ── 핀 섹션 ── */
    .pinned-section {
      background: #fff;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      display: none;
    }
    .pinned-section.visible { display: block; }
    .pinned-header {
      font-size: 13px;
      font-weight: 700;
      color: #555;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .pinned-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      background: #f0f9ff;
      border: 1.5px solid #0ea5e9;
      border-radius: 8px;
      flex-wrap: wrap;
    }
    .pinned-title { flex: 1; font-size: 14px; font-weight: 600; }
    .pinned-title a { color: #0369a1; text-decoration: none; }
    .pinned-title a:hover { text-decoration: underline; }
    .pinned-price { font-size: 16px; font-weight: 700; color: #e53e3e; white-space: nowrap; }
    .pinned-meta { font-size: 12px; color: #888; }
    .pinned-target { font-size: 12px; color: #555; background: #e0f2fe; padding: 3px 8px; border-radius: 12px; }
    .unpin-btn {
      background: none;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 12px;
      cursor: pointer;
      color: #888;
    }
    .unpin-btn:hover { border-color: #e53e3e; color: #e53e3e; }

    /* ── 결과 테이블 ── */
    .results-wrap {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    .results-summary {
      padding: 10px 16px;
      font-size: 13px;
      color: #666;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    table { width: 100%; border-collapse: collapse; }
    thead { background: #f8f9ff; }
    th {
      padding: 11px 14px;
      text-align: left;
      font-size: 12px;
      color: #666;
      font-weight: 600;
    }
    td {
      padding: 11px 14px;
      font-size: 13px;
      border-top: 1px solid #f5f5f5;
      vertical-align: middle;
    }
    tr.lowest { background: #fffbe6; }
    tr:hover { background: #f7f9ff; }
    tr.lowest:hover { background: #fff5cc; }

    .rank { font-weight: 700; color: #ccc; font-size: 12px; }
    tr.lowest .rank { color: #f59e0b; }

    .prod-title a { color: #222; text-decoration: none; font-weight: 500; }
    .prod-title a:hover { color: #1a73e8; text-decoration: underline; }

    .price-col { font-weight: 700; font-size: 15px; color: #e53e3e; white-space: nowrap; }
    tr.lowest .price-col { color: #d97706; }
    .mall-col { color: #666; font-size: 12px; }

    .badge {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 700;
    }
    .badge-naver  { background: #e6faf0; color: #03c75a; }
    .badge-danawa { background: #fff0e6; color: #e86200; }
    .badge-enuri  { background: #f3e8ff; color: #7c3aed; }

    .pin-btn {
      background: none;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 12px;
      cursor: pointer;
      color: #aaa;
      transition: all 0.15s;
    }
    .pin-btn:hover { border-color: #1a73e8; color: #1a73e8; }
    .pin-btn.pinned { background: #e8f0fe; border-color: #1a73e8; color: #1a73e8; }

    /* ── 판매처 펼치기 ── */
    .expand-btn {
      background: none;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 11px;
      cursor: pointer;
      color: #888;
      white-space: nowrap;
    }
    .expand-btn:hover { border-color: #1a73e8; color: #1a73e8; }
    .sellers-list {
      display: none;
      margin-top: 6px;
      border-top: 1px solid #f0f0f0;
      padding-top: 6px;
    }
    .sellers-list.open { display: block; }
    .seller-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      font-size: 12px;
      color: #555;
    }
    .seller-row a { color: #1a73e8; text-decoration: none; }
    .seller-row a:hover { text-decoration: underline; }
    .seller-price { font-weight: 700; color: #e53e3e; }
    .seller-best { font-size: 10px; background: #fef9c3; color: #b45309; padding: 1px 5px; border-radius: 4px; }

    /* ── 태그 입력 ── */
    .tag-input-wrap {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 5px;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 4px 8px;
      background: #fff;
      flex: 1;
      min-width: 180px;
      cursor: text;
    }
    .tag-chip {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      background: #e8f0fe;
      color: #1a73e8;
      border-radius: 12px;
      padding: 2px 8px 2px 10px;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }
    .tag-chip.exclude { background: #fce8e8; color: #e53e3e; }
    .tag-remove {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 13px;
      color: inherit;
      padding: 0;
      line-height: 1;
      opacity: 0.6;
    }
    .tag-remove:hover { opacity: 1; }
    .tag-text-input {
      border: none;
      outline: none;
      font-size: 13px;
      min-width: 70px;
      flex: 1;
      padding: 2px 0;
    }
    .tag-add-btn {
      padding: 4px 10px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .tag-add-btn:hover { background: #1558b0; }

    /* ── 로딩/빈 결과 ── */
    .empty-box {
      text-align: center;
      padding: 60px 0;
      color: #bbb;
      font-size: 15px;
    }
    .spinner-wrap { display: flex; justify-content: center; padding: 40px 0; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #e0e0e0;
      border-top-color: #1a73e8;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <h1>썬탱의 최저가 비교 사이트</h1>
  <div class="search-row">
    <input id="queryInput" type="text" placeholder="상품명 입력 (예: 아이패드 프로)" />
    <button onclick="doSearch()">검색</button>
  </div>
</header>

<div id="tabBar"><span id="noTab" style="color:rgba(255,255,255,0.7);font-size:13px;padding:10px 4px;">검색하면 탭이 생성됩니다</span></div>

<div id="tabPanels"></div>

<script>
  let tabs = {};
  let activeTabId = null;

  const INTERVALS = { "0": "수동", "60": "1분", "300": "5분", "600": "10분", "1800": "30분", "3600": "1시간" };
  const SOURCE_CLASS = { "네이버": "naver", "다나와": "danawa", "에누리": "enuri" };
  const STORAGE_KEY = "price_compare_tabs";
  const STORAGE_ACTIVE = "price_compare_active";

  document.getElementById("queryInput").addEventListener("keydown", e => {
    if (e.key === "Enter") doSearch();
  });

  function fmt(n) { return n.toLocaleString("ko-KR") + "원"; }
  function now()  { return new Date().toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit", second: "2-digit" }); }
  function badge(src) {
    const c = SOURCE_CLASS[src] || "naver";
    return `<span class="badge badge-${c}">${src}</span>`;
  }

  // ── localStorage 저장/복원 ────────────────────────────────
  function saveTabs() {
    const toSave = {};
    Object.values(tabs).forEach(t => {
      toSave[t.id] = {
        id: t.id, query: t.query, pinned: t.pinned, targetPrice: t.targetPrice,
        interval: t.interval, mustIncludeTags: t.mustIncludeTags || [], excludeTags: t.excludeTags || [], minPrice: t.minPrice, maxPrice: t.maxPrice
      };
    });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
    if (activeTabId) localStorage.setItem(STORAGE_ACTIVE, activeTabId);
  }

  function loadTabs() {
    try {
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
      const savedActive = localStorage.getItem(STORAGE_ACTIVE);
      const ids = Object.keys(saved);
      if (ids.length === 0) return;

      ids.forEach(id => {
        const s = saved[id];
        // backward compat: convert old comma-string format to arrays
        let mustIncludeTags = Array.isArray(s.mustIncludeTags) ? s.mustIncludeTags : [];
        let excludeTags = Array.isArray(s.excludeTags) ? s.excludeTags : [];
        if (!mustIncludeTags.length && s.mustInclude)
          mustIncludeTags = s.mustInclude.split(",").map(w => w.trim()).filter(Boolean);
        if (!excludeTags.length && s.excludeKeywords)
          excludeTags = s.excludeKeywords.split(",").map(w => w.trim()).filter(Boolean);

        tabs[id] = {
          id, query: s.query, results: [], pinned: s.pinned || null, targetPrice: s.targetPrice || null,
          alerts: [], interval: s.interval || 0, timer: null, lastUpdated: null,
          mustIncludeTags, excludeTags, minPrice: s.minPrice || "", maxPrice: s.maxPrice || ""
        };
        renderTab(id);
        // 저장된 핀 복원
        if (tabs[id].pinned) renderPinned(id);
        // 저장된 필터 복원
        if (mustIncludeTags.length) renderTags(id, 'mustInclude');
        if (excludeTags.length)     renderTags(id, 'exclude');
        if (tabs[id].minPrice) document.getElementById("minPrice_" + id).value = tabs[id].minPrice;
        if (tabs[id].maxPrice) document.getElementById("maxPrice_" + id).value = tabs[id].maxPrice;
        // 저장된 자동 새로고침 복원
        if (tabs[id].interval > 0) {
          document.getElementById("interval_" + id).value = tabs[id].interval;
          setInterval_(id, tabs[id].interval);
        }
      });

      const firstId = savedActive && tabs[savedActive] ? savedActive : ids[0];
      activateTab(firstId);
      ids.forEach(id => refresh(id));
    } catch(e) {
      localStorage.removeItem(STORAGE_KEY);
    }
  }

  // ── 검색 ──────────────────────────────────────────────────
  function doSearch() {
    const q = document.getElementById("queryInput").value.trim();
    if (!q) return;

    const existing = Object.values(tabs).find(t => t.query === q);
    if (existing) { activateTab(existing.id); refresh(existing.id); return; }

    const id = "tab_" + Date.now();
    tabs[id] = { id, query: q, results: [], pinned: null, targetPrice: null, alerts: [], interval: 0, timer: null, lastUpdated: null, mustIncludeTags: [], excludeTags: [], minPrice: "", maxPrice: "" };
    renderTab(id);
    activateTab(id);
    refresh(id);
    saveTabs();
  }

  // ── 탭 렌더링 ─────────────────────────────────────────────
  function renderTab(id) {
    const t = tabs[id];
    document.getElementById("noTab")?.remove();

    const tabBar = document.getElementById("tabBar");
    const tabEl = document.createElement("div");
    tabEl.className = "tab";
    tabEl.id = "tabBtn_" + id;
    tabEl.innerHTML = `<span onclick="activateTab('${id}')">${t.query}</span>
      <button class="close-btn" onclick="closeTab('${id}')">✕</button>`;
    tabBar.appendChild(tabEl);

    const panels = document.getElementById("tabPanels");
    const panel = document.createElement("div");
    panel.className = "tab-panel";
    panel.id = "panel_" + id;
    panel.innerHTML = `
      <div class="ctrl-bar">
        <label>자동 새로고침</label>
        <select id="interval_${id}" onchange="setInterval_(${JSON.stringify(id)}, this.value)">
          ${Object.entries(INTERVALS).map(([v,l]) => `<option value="${v}">${l}</option>`).join("")}
        </select>
        <button class="refresh-btn" onclick="refresh('${id}')">지금 새로고침</button>
        <span class="countdown" id="countdown_${id}"></span>
        <span class="last-update" id="lastUpdate_${id}">-</span>
      </div>
      <div class="filter-bar">
        <label>필수 포함</label>
        <div class="tag-input-wrap" id="mustIncludeWrap_${id}">
          <div id="mustIncludeTags_${id}" style="display:contents"></div>
          <input type="text" class="tag-text-input" id="mustIncludeInput_${id}" placeholder="단어 입력"
            onkeydown="handleTagKeydown(event,'${id}','mustInclude')"/>
          <button class="tag-add-btn" onclick="addTag('${id}','mustInclude')">추가</button>
        </div>
        <label>제외 단어</label>
        <div class="tag-input-wrap" id="excludeWrap_${id}">
          <div id="excludeTags_${id}" style="display:contents"></div>
          <input type="text" class="tag-text-input" id="excludeInput_${id}" placeholder="단어 입력"
            onkeydown="handleTagKeydown(event,'${id}','exclude')"/>
          <button class="tag-add-btn" onclick="addTag('${id}','exclude')">추가</button>
        </div>
        <label>가격 범위</label>
        <input type="number" id="minPrice_${id}" placeholder="최소"
          oninput="scheduleRefresh('${id}')" />
        <span class="divider">~</span>
        <input type="number" id="maxPrice_${id}" placeholder="최대"
          oninput="scheduleRefresh('${id}')" />
        <span class="filter-count" id="filterCount_${id}"></span>
      </div>
      <div class="alert-area" id="alertArea_${id}"></div>
      <div class="pinned-section" id="pinnedSection_${id}">
        <div class="pinned-header">📌 내 선택 최저가</div>
        <div id="pinnedRow_${id}"></div>
      </div>
      <div class="results-wrap">
        <div class="results-summary" id="summary_${id}">검색 중...</div>
        <div id="tableWrap_${id}"></div>
      </div>`;
    panels.appendChild(panel);
  }

  function activateTab(id) {
    activeTabId = id;
    document.querySelectorAll(".tab").forEach(el => el.classList.remove("active"));
    document.querySelectorAll(".tab-panel").forEach(el => el.classList.remove("active"));
    document.getElementById("tabBtn_" + id)?.classList.add("active");
    document.getElementById("panel_" + id)?.classList.add("active");
    localStorage.setItem(STORAGE_ACTIVE, id);
  }

  function closeTab(id) {
    clearTabTimers(id);
    delete tabs[id];
    document.getElementById("tabBtn_" + id)?.remove();
    document.getElementById("panel_" + id)?.remove();

    const remaining = Object.keys(tabs);
    if (remaining.length === 0) {
      const noTab = document.createElement("span");
      noTab.id = "noTab";
      noTab.style.cssText = "color:rgba(255,255,255,0.7);font-size:13px;padding:10px 4px;";
      noTab.textContent = "검색하면 탭이 생성됩니다";
      document.getElementById("tabBar").appendChild(noTab);
      activeTabId = null;
    } else {
      activateTab(remaining[remaining.length - 1]);
    }
    saveTabs();
  }

  // ── 자동 새로고침 + 카운트다운 ──────────────────────────────
  function setInterval_(id, val) {
    const t = tabs[id];
    if (!t) return;
    if (t.timer) clearInterval(t.timer);
    if (t.countdown) clearInterval(t.countdown);
    t.interval = parseInt(val);
    const cdEl = document.getElementById("countdown_" + id);
    if (t.interval > 0) {
      let remaining = t.interval;
      const tick = () => {
        remaining--;
        if (cdEl) {
          cdEl.classList.add("active");
          const m = Math.floor(remaining / 60);
          const s = remaining % 60;
          cdEl.textContent = m > 0 ? `${m}분 ${s}초 후 갱신` : `${s}초 후 갱신`;
        }
        if (remaining <= 0) {
          remaining = t.interval;
          refresh(id);
        }
      };
      tick();
      t.countdown = setInterval(tick, 1000);
      t.timer = true;
    } else {
      t.timer = null;
      t.countdown = null;
      if (cdEl) cdEl.classList.remove("active");
    }
    saveTabs();
  }

  function clearTabTimers(id) {
    const t = tabs[id];
    if (!t) return;
    if (t.countdown) clearInterval(t.countdown);
    t.timer = null;
    t.countdown = null;
  }

  // ── 데이터 가져오기 ───────────────────────────────────────
  async function refresh(id) {
    const t = tabs[id];
    if (!t) return;

    const summary = document.getElementById("summary_" + id);
    const tableWrap = document.getElementById("tableWrap_" + id);
    summary.textContent = "검색 중...";
    tableWrap.innerHTML = `<div class="spinner-wrap"><div class="spinner"></div></div>`;

    try {
      const params = new URLSearchParams({ q: t.query });
      if (t.mustIncludeTags?.length) params.set("include",   t.mustIncludeTags.join(","));
      if (t.excludeTags?.length)     params.set("exclude",   t.excludeTags.join(","));
      if (t.minPrice)                params.set("min_price", t.minPrice);
      if (t.maxPrice)                params.set("max_price", t.maxPrice);
      const res = await fetch(`/api/search?${params}`);
      const data = await res.json();
      t.results = data;
      t.lastUpdated = now();
      document.getElementById("lastUpdate_" + id).textContent = "업데이트: " + t.lastUpdated;

      // 핀된 가격보다 저렴한 결과 체크
      if (t.pinned && data.length > 0) {
        const cheapest = data[0];
        if (cheapest.price < t.targetPrice && cheapest.link !== t.pinned.link) {
          addAlert(id, cheapest);
        }
      }

      renderResults(id);
    } catch (e) {
      summary.textContent = "오류 발생. 다시 시도해주세요.";
      tableWrap.innerHTML = `<div class="empty-box">데이터를 불러오지 못했습니다.</div>`;
    }
  }

  // ── 필터 디바운스 재검색 ──────────────────────────────────
  const _refreshTimers = {};
  function scheduleRefresh(id) {
    const t = tabs[id];
    if (!t) return;
    t.minPrice = document.getElementById("minPrice_" + id)?.value || "";
    t.maxPrice = document.getElementById("maxPrice_" + id)?.value || "";
    saveTabs();
    clearTimeout(_refreshTimers[id]);
    _refreshTimers[id] = setTimeout(() => refresh(id), 800);
  }

  function handleTagKeydown(event, id, field) {
    if (event.key === "Enter") { event.preventDefault(); addTag(id, field); }
  }

  function addTag(id, field) {
    const t = tabs[id];
    if (!t) return;
    const inputEl = document.getElementById((field === 'mustInclude' ? 'mustIncludeInput_' : 'excludeInput_') + id);
    const word = inputEl?.value.trim();
    if (!word) return;
    const arr = field === 'mustInclude' ? t.mustIncludeTags : t.excludeTags;
    if (!arr.includes(word)) {
      arr.push(word);
      renderTags(id, field);
      saveTabs();
      clearTimeout(_refreshTimers[id]);
      _refreshTimers[id] = setTimeout(() => refresh(id), 800);
    }
    if (inputEl) { inputEl.value = ""; inputEl.focus(); }
  }

  function removeTag(id, field, index) {
    const t = tabs[id];
    if (!t) return;
    const arr = field === 'mustInclude' ? t.mustIncludeTags : t.excludeTags;
    arr.splice(index, 1);
    renderTags(id, field);
    saveTabs();
    clearTimeout(_refreshTimers[id]);
    _refreshTimers[id] = setTimeout(() => refresh(id), 800);
  }

  function renderTags(id, field) {
    const t = tabs[id];
    if (!t) return;
    const arr = field === 'mustInclude' ? t.mustIncludeTags : t.excludeTags;
    const container = document.getElementById((field === 'mustInclude' ? 'mustIncludeTags_' : 'excludeTags_') + id);
    if (!container) return;
    const chipClass = field === 'mustInclude' ? 'tag-chip' : 'tag-chip exclude';
    container.innerHTML = arr.map((word, i) =>
      `<span class="${chipClass}">${word}<button class="tag-remove" onclick="removeTag('${id}','${field}',${i})">✕</button></span>`
    ).join('');
  }

  function getFiltered(id) { return tabs[id]?.results || []; }

  // ── 결과 렌더링 ───────────────────────────────────────────
  function renderResults(id) {
    const t = tabs[id];
    const data = getFiltered(id);
    const total = t.results.length;
    const filtered = total - data.length;
    const summary = document.getElementById("summary_" + id);
    const tableWrap = document.getElementById("tableWrap_" + id);
    const filterCount = document.getElementById("filterCount_" + id);

    if (filterCount) {
      filterCount.textContent = filtered > 0 ? `${filtered}개 필터됨` : "";
    }

    if (!t.results.length) {
      summary.textContent = "검색 결과가 없습니다.";
      tableWrap.innerHTML = `<div class="empty-box">결과가 없습니다.</div>`;
      return;
    }

    if (!data.length) {
      summary.textContent = `전체 ${total}개 (필터로 전부 제외됨)`;
      tableWrap.innerHTML = `<div class="empty-box">필터 조건에 맞는 결과가 없습니다.<br><small>제외 단어나 가격 범위를 조정해 보세요.</small></div>`;
      return;
    }

    const counts = { 네이버: 0, 다나와: 0, 에누리: 0 };
    data.forEach(d => { if (counts[d.source] !== undefined) counts[d.source]++; });
    summary.innerHTML = `<strong>${data.length}개</strong> 표시 / 전체 ${total}개 &nbsp;` +
      Object.entries(counts).map(([k,v]) => v > 0 ? badge(k) + ` ${v}건` : "").filter(Boolean).join(" ");

    const tbody = data.map((item, i) => {
      const isLowest = i === 0;
      const isPinned = t.pinned && t.pinned.link === item.link;
      const rankCell = isLowest ? `<span style="color:#f59e0b;font-size:14px">👑</span>` : `<span class="rank">${i+1}</span>`;
      const titleCell = item.link
        ? `<a href="${item.link}" target="_blank" rel="noopener">${item.title}</a>`
        : item.title;

      const sellers = item.sellers || [];
      const extraSellers = sellers.slice(1);
      const sellersHtml = extraSellers.length > 0 ? `
        <button class="expand-btn" onclick="toggleSellers(this)">다른 판매처 ${extraSellers.length}개 ▾</button>
        <div class="sellers-list">
          ${extraSellers.map((s, si) => `
            <div class="seller-row">
              <span class="seller-price">${fmt(s.price)}</span>
              <span>${s.mall || '-'}</span>
              ${s.link ? `<a href="${s.link}" target="_blank" rel="noopener">바로가기</a>` : ''}
            </div>`).join('')}
        </div>` : '';

      return `<tr class="${isLowest ? 'lowest' : ''}">
        <td>${rankCell}</td>
        <td class="prod-title">
          ${titleCell}
          ${sellersHtml}
        </td>
        <td>${badge(item.source)}</td>
        <td class="mall-col">${item.mall || '-'}</td>
        <td class="price-col">${fmt(item.price)}</td>
        <td><button class="pin-btn ${isPinned ? 'pinned' : ''}" onclick="togglePin('${id}', ${i})">${isPinned ? '📌 해제' : '📌 선택'}</button></td>
      </tr>`;
    }).join("");

    tableWrap.innerHTML = `<table>
      <thead><tr>
        <th style="width:36px">#</th>
        <th>상품명</th>
        <th>출처</th>
        <th>판매처</th>
        <th>가격</th>
        <th style="width:80px"></th>
      </tr></thead>
      <tbody>${tbody}</tbody>
    </table>`;
  }

  // ── 핀 토글 ───────────────────────────────────────────────
  function togglePin(id, idx) {
    const t = tabs[id];
    const item = t.results[idx];
    if (t.pinned && t.pinned.link === item.link) {
      t.pinned = null;
      t.targetPrice = null;
      document.getElementById("pinnedSection_" + id).classList.remove("visible");
    } else {
      t.pinned = item;
      t.targetPrice = item.price;
      renderPinned(id);
    }
    renderResults(id);
    saveTabs();
  }

  function renderPinned(id) {
    const t = tabs[id];
    if (!t.pinned) return;
    const p = t.pinned;
    const section = document.getElementById("pinnedSection_" + id);
    section.classList.add("visible");
    document.getElementById("pinnedRow_" + id).innerHTML = `
      <div class="pinned-row">
        <div class="pinned-title">
          ${p.link ? `<a href="${p.link}" target="_blank" rel="noopener">${p.title}</a>` : p.title}
        </div>
        <span class="pinned-price">${fmt(p.price)}</span>
        <span class="pinned-meta">${badge(p.source)} ${p.mall || ''}</span>
        <span class="pinned-target">목표가: ${fmt(t.targetPrice)}</span>
        <button class="unpin-btn" onclick="togglePin('${id}', ${t.results.findIndex(r => r.link === p.link)})">해제</button>
      </div>`;
  }

  // ── 판매처 펼치기 ────────────────────────────────────────
  function toggleSellers(btn) {
    const list = btn.nextElementSibling;
    const open = list.classList.toggle("open");
    btn.textContent = btn.textContent.replace(open ? "▾" : "▴", open ? "▴" : "▾");
  }

  // ── 페이지 로드 시 복원 ───────────────────────────────────
  window.addEventListener("DOMContentLoaded", loadTabs);

  // ── 알림 ──────────────────────────────────────────────────
  function addAlert(id, item) {
    const area = document.getElementById("alertArea_" + id);
    const alertId = "alert_" + Date.now();
    const div = document.createElement("div");
    div.className = "alert-card";
    div.id = alertId;
    div.innerHTML = `
      <div class="alert-icon">🎉</div>
      <div class="alert-body">
        <div class="alert-title">추천! 새로운 최저가 갱신 사이트 발견</div>
        <div class="alert-desc">
          ${badge(item.source)} <strong>${item.mall || item.source}</strong> &nbsp;
          <strong style="color:#e53e3e">${fmt(item.price)}</strong>
          (선택가 ${fmt(tabs[id].targetPrice)} 대비 <strong>${fmt(tabs[id].targetPrice - item.price)}</strong> 저렴) &nbsp;
          ${item.link ? `<a href="${item.link}" target="_blank" rel="noopener">바로가기 →</a>` : ''}
        </div>
        <div style="font-size:11px;color:#aaa;margin-top:4px;">${now()} 발견</div>
      </div>
      <button class="alert-dismiss" onclick="document.getElementById('${alertId}').remove()">닫기</button>`;
    area.prepend(div);
  }
</script>
</body>
</html>
