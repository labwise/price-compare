<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>최저가 비교</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Malgun Gothic', sans-serif; background: #f5f6fa; color: #333; }

    header {
      background: #1a73e8;
      color: #fff;
      padding: 24px 0;
      text-align: center;
    }
    header h1 { font-size: 24px; font-weight: 700; }
    header p { margin-top: 6px; font-size: 13px; opacity: 0.85; }

    .search-box {
      display: flex;
      justify-content: center;
      padding: 28px 16px 16px;
      gap: 8px;
    }
    .search-box input {
      width: 480px;
      max-width: 100%;
      padding: 12px 16px;
      font-size: 15px;
      border: 2px solid #1a73e8;
      border-radius: 8px;
      outline: none;
    }
    .search-box button {
      padding: 12px 24px;
      background: #1a73e8;
      color: #fff;
      font-size: 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .search-box button:hover { background: #1558b0; }

    .status {
      text-align: center;
      font-size: 13px;
      color: #666;
      min-height: 24px;
      margin-bottom: 8px;
    }

    .spinner {
      display: none;
      margin: 20px auto;
      width: 36px; height: 36px;
      border: 4px solid #ddd;
      border-top-color: #1a73e8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .container { max-width: 1100px; margin: 0 auto; padding: 0 16px 40px; }

    .summary {
      display: none;
      margin-bottom: 12px;
      font-size: 14px;
      color: #555;
    }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      margin-left: 4px;
    }
    .badge-naver  { background: #03c75a20; color: #03c75a; }
    .badge-danawa { background: #e8620020; color: #e86200; }
    .badge-enuri  { background: #7c3aed20; color: #7c3aed; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    thead { background: #f0f4ff; }
    th {
      padding: 13px 14px;
      text-align: left;
      font-size: 13px;
      color: #555;
      font-weight: 600;
    }
    td {
      padding: 12px 14px;
      font-size: 14px;
      border-top: 1px solid #f0f0f0;
      vertical-align: middle;
    }
    tr.lowest { background: #fffbe6; }
    tr:hover { background: #f5f8ff; }
    tr.lowest:hover { background: #fff5cc; }

    .rank { font-weight: 700; color: #999; font-size: 13px; }
    tr.lowest .rank { color: #f59e0b; }
    .crown { margin-right: 2px; }

    .prod-title { font-weight: 500; }
    .prod-title a { color: #333; text-decoration: none; }
    .prod-title a:hover { text-decoration: underline; color: #1a73e8; }

    .price-col { font-weight: 700; font-size: 15px; color: #e53e3e; white-space: nowrap; }
    tr.lowest .price-col { color: #d97706; }

    .mall-col { color: #555; font-size: 13px; }

    .no-result {
      display: none;
      text-align: center;
      padding: 60px 0;
      color: #999;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <header>
    <h1>최저가 비교</h1>
    <p>네이버 쇼핑 · 다나와 · 에누리 동시 검색</p>
  </header>

  <div class="search-box">
    <input id="query" type="text" placeholder="상품명을 입력하세요 (예: 갤럭시 S25)" />
    <button onclick="doSearch()">검색</button>
  </div>

  <div class="container">
    <div class="status" id="status"></div>
    <div class="spinner" id="spinner"></div>
    <div class="summary" id="summary"></div>
    <div class="no-result" id="noResult">검색 결과가 없습니다.</div>
    <table id="resultTable" style="display:none">
      <thead>
        <tr>
          <th style="width:44px">#</th>
          <th>상품명</th>
          <th>출처</th>
          <th>판매처</th>
          <th>가격</th>
        </tr>
      </thead>
      <tbody id="resultBody"></tbody>
    </table>
  </div>

  <script>
    document.getElementById("query").addEventListener("keydown", e => {
      if (e.key === "Enter") doSearch();
    });

    function fmt(n) {
      return n.toLocaleString("ko-KR") + "원";
    }

    function badgeHtml(source) {
      const map = { "네이버": "naver", "다나와": "danawa", "에누리": "enuri" };
      const cls = map[source] || "naver";
      return `<span class="badge badge-${cls}">${source}</span>`;
    }

    async function doSearch() {
      const q = document.getElementById("query").value.trim();
      if (!q) return;

      document.getElementById("spinner").style.display = "block";
      document.getElementById("resultTable").style.display = "none";
      document.getElementById("noResult").style.display = "none";
      document.getElementById("summary").style.display = "none";
      document.getElementById("status").textContent = "검색 중...";

      try {
        const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
        const data = await res.json();

        document.getElementById("spinner").style.display = "none";

        if (!data.length) {
          document.getElementById("noResult").style.display = "block";
          document.getElementById("status").textContent = "";
          return;
        }

        const counts = { 네이버: 0, 다나와: 0, 에누리: 0 };
        data.forEach(d => { if (counts[d.source] !== undefined) counts[d.source]++; });

        document.getElementById("summary").style.display = "block";
        document.getElementById("summary").innerHTML =
          `총 <strong>${data.length}개</strong> 결과 · ` +
          Object.entries(counts).map(([k,v]) => `${badgeHtml(k)} ${v}건`).join(" ");

        const tbody = document.getElementById("resultBody");
        tbody.innerHTML = "";

        data.forEach((item, i) => {
          const isLowest = i === 0;
          const tr = document.createElement("tr");
          if (isLowest) tr.className = "lowest";

          const rankCell = isLowest
            ? `<span class="crown">👑</span><span class="rank">1</span>`
            : `<span class="rank">${i + 1}</span>`;

          const titleCell = item.link
            ? `<a href="${item.link}" target="_blank" rel="noopener">${item.title}</a>`
            : item.title;

          tr.innerHTML = `
            <td>${rankCell}</td>
            <td class="prod-title">${titleCell}</td>
            <td>${badgeHtml(item.source)}</td>
            <td class="mall-col">${item.mall || "-"}</td>
            <td class="price-col">${fmt(item.price)}</td>
          `;
          tbody.appendChild(tr);
        });

        document.getElementById("resultTable").style.display = "table";
        document.getElementById("status").textContent =
          `최저가: ${fmt(data[0].price)} (${data[0].mall || data[0].source})`;

      } catch (err) {
        document.getElementById("spinner").style.display = "none";
        document.getElementById("status").textContent = "오류가 발생했습니다. 서버를 확인해주세요.";
        console.error(err);
      }
    }
  </script>
</body>
</html>
